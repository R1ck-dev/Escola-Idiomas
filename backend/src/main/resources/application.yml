spring:
  application:
    name: escola-idiomas

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/escola_idiomas}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # o schema e' de responsabilidade do Flyway; Hibernate apenas valida
    properties:
      "[hibernate.format_sql]": true

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": ${MAIL_SMTP_AUTH:false}
      "[mail.smtp.starttls.enable]": ${MAIL_SMTP_STARTTLS:false}

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h, sem refresh token

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  web:
    base-url: ${APP_WEB_BASE_URL:http://localhost:5173}   # base dos links de e-mail (1o acesso / recuperacao)
  mail:
    from: ${MAIL_FROM:no-reply@escolaidiomas.app}
  job:
    trigger-secret: ${JOB_TRIGGER_SECRET:}   # protege os endpoints /jobs/** (cron externo)
  pix:
    # Recebedor PIX da escola (RN-26). BR Code local, sem PSP: valor embutido, baixa manual/simulada.
    chave: ${PIX_CHAVE:pix@escolaidiomas.app}
    recebedor: ${PIX_RECEBEDOR:Escola de Idiomas}
    cidade: ${PIX_CIDADE:Florianopolis}
  boleto:
    # Beneficiario/conta do boleto (RN-25). Formato FEBRABAN valido, sem API do banco: baixa manual/simulada.
    banco: ${BOLETO_BANCO:077}   # 077 = Banco Inter
    beneficiario: ${BOLETO_BENEFICIARIO:Escola de Idiomas}
    agencia: ${BOLETO_AGENCIA:0001}
    conta: ${BOLETO_CONTA:1234567}
    carteira: ${BOLETO_CARTEIRA:1}
  seed:
    gestao:
      nome: ${SEED_GESTAO_NOME:Gestor Padrao}
      email: ${SEED_GESTAO_EMAIL:gestao@escolaidiomas.local}
      password: ${SEED_GESTAO_PASSWORD:}   # vazio => seeder nao cria (evita conta com senha default em producao)
